<!DOCTYPE html>
<html>
<head>
    <title>Packing Slip - {{orderNo}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');
        @media print {
            @page { size: A4; margin: 15mm; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            font-size: 12px;
            line-height: 1.4;
            background: white;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
        }
        .header-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .order-no {
            font-size: 12px;
            color: #333;
            margin-bottom: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #f5f5f5;
            font-weight: 600;
            font-size: 11px;
        }
        td {
            font-size: 11px;
        }
        td img {
            border-radius: 4px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">Packing Slip</div>
        <div class="order-no">Order No: {{orderNo}}</div>
    </div>
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Product Image</th>
                <th>Product Name</th>
                <th>Variant</th>
                <th>Price</th>
                <th>Qty</th>
            </tr>
        </thead>
        <tbody>
            {{productsHtml}}
        </tbody>
        <tfoot>
            <tr style="background-color: #f5f5f5; font-weight: 600;">
                <td colspan="5" style="text-align: right; padding: 10px;">Total Payable Amount:</td>
                <td style="padding: 10px;">₹{{payableAmount}}</td>
            </tr>
        </tfoot>
    </table>
    <div class="footer">
        Thank you for your order!
    </div>
</body>
</html>
